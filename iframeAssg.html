<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table and IFrame</title>
</head>
<style>
    table {
        border-collapse: collapse;
        text-align: center;
    }

    td,
    th {
        border: 1px solid black;
        padding: 10px;
    }

    .concatenate {
        background-color: #5b8abc;
    }

    tr:nth-child(even) {
        background-color: rgb(242, 188, 197);
    }

    tr:nth-child(odd) {
        background-color: rgb(158, 17, 158);
    }
</style>

<body>
    <table>
        <thead>
            <tr>
                <th class="concatenate" scope="col">Title</th>
                <th class="concatenate" scope="col">Links</th>
            </tr>
        </thead>
        <tbody>

            <tr>
                <td>Dai Dai</td>
                <td><iframe width="100" height="100" src="https://www.youtube.com/embed/fcnDmrtj6Sk"
                        title="Shakira, Burna Boy - Dai Dai (Official Video)" frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></td>
            </tr>

            <tr>
                <td>Love is Gun - By Daniel Savey</td>
                <td><iframe width="100" height="100" src="https://www.youtube.com/embed/VkZMsqL1cSo"
                        title="Daniel Seavey - Love&#39;s a Gun (Official Video)" frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></td>
            </tr>
            <tr>
                <td>Raaga of Revenge By Aniruddha</td>
                <td><iframe width="100" height="100" src="https://www.youtube.com/embed/NAkQVL61BRI"
                        title="Raga of Revenge (From &quot;DC&quot;)" frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></td>
            </tr>
            <tr>
                <td>Smooth Criminal by Michael Jackson</td>
                <td><iframe width="100" height="100" src="https://www.youtube.com/embed/h_D3VFfhvs4"
                        title="Michael Jackson - Smooth Criminal (Official Video)" frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></td>
            </tr>
            <tr>
                <td>ChandraChooda by Anoop Sankar</td>
                <td><iframe width="100" height="100" src="https://www.youtube.com/embed/y0uZABib60g"
                        title="Chandrachooda - Anoop Sankar" frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></td>
            </tr>

        </tbody>

    </table>
</body>

</html>
